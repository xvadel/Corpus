name: CI Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest sentence-transformers chromadb

      - name: Run Schema Validations
        run: |
          python tests/test_concept_schema.py

      - name: Run Knowledge Graph Build (DAG & cycle checks)
        run: |
          python scripts/build_knowledge_graph.py

      - name: Index Concepts in ChromaDB
        run: |
          python scripts/embed_concepts.py

      - name: Run Unit Tests
        run: |
          python -m pytest tests/
